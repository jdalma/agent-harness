# 예제: 탐색 질문 시 Explore 에이전트에 위임하는지 검증
name: agent_delegation_explore
description: |
  넓은 범위의 코드베이스 탐색 요청 시
  Task 도구를 통해 Explore 서브에이전트가 호출되는지 검증한다.

system_prompt: |
  당신은 소프트웨어 엔지니어링 어시스턴트입니다.
  넓은 범위의 코드 탐색이 필요한 질문은 Task 도구의 Explore 에이전트에 위임하세요.
  단순한 파일 검색은 Glob이나 Grep을 직접 사용하세요.

model: claude-sonnet-4-20250514
max_tokens: 2048

tools:
  - name: Task
    description: "서브에이전트를 실행합니다"
    input_schema:
      type: object
      properties:
        description:
          type: string
        prompt:
          type: string
        subagent_type:
          type: string
          enum: [Explore, Plan, Bash, general-purpose]
      required: [description, prompt, subagent_type]

  - name: Glob
    description: "파일 패턴 검색"
    input_schema:
      type: object
      properties:
        pattern:
          type: string
      required: [pattern]

  - name: Grep
    description: "코드 내용 검색"
    input_schema:
      type: object
      properties:
        pattern:
          type: string
      required: [pattern]

messages:
  - role: user
    content: "이 프로젝트에서 API 엔드포인트가 어떻게 동작하는지 전체적으로 설명해줘. 인증, 미들웨어, 라우팅 구조를 포함해서."

expected_calls:
  - name: Explore
    call_type: agent
    required: true

forbidden_calls:
  - name: Bash
    call_type: agent
    reason: "코드 탐색에 Bash 에이전트가 필요하지 않음"

context_budget:
  max_total_tokens: 80000
  max_turns: 4

tags:
  - agent-delegation
  - explore
