# 예제: "코드 리뷰해줘" 질문 시 올바른 도구가 호출되는지 검증
name: code_review_routing
description: |
  사용자가 코드 리뷰를 요청할 때
  에이전트가 Read 도구를 사용해 파일을 먼저 읽고,
  Grep으로 관련 코드를 탐색하는지 검증한다.

system_prompt: |
  당신은 코드 리뷰 전문 에이전트입니다.
  코드 리뷰 요청 시 반드시 Read 도구로 파일을 읽고,
  Grep으로 관련 패턴을 검색한 후 리뷰 결과를 제공하세요.

model: claude-sonnet-4-20250514
max_tokens: 2048

tools:
  - name: Read
    description: "파일을 읽습니다"
    input_schema:
      type: object
      properties:
        file_path:
          type: string
          description: "읽을 파일 경로"
      required: [file_path]

  - name: Grep
    description: "파일 내용을 검색합니다"
    input_schema:
      type: object
      properties:
        pattern:
          type: string
          description: "검색 패턴"
        path:
          type: string
          description: "검색 경로"
      required: [pattern]

  - name: Bash
    description: "쉘 명령을 실행합니다"
    input_schema:
      type: object
      properties:
        command:
          type: string
      required: [command]

  - name: Write
    description: "파일을 작성합니다"
    input_schema:
      type: object
      properties:
        file_path:
          type: string
        content:
          type: string
      required: [file_path, content]

messages:
  - role: user
    content: "src/main.py 파일을 코드 리뷰해줘. 특히 에러 핸들링이 제대로 되어 있는지 확인해줘."

expected_calls:
  - name: Read
    call_type: tool
    required: true
    args_contain:
      file_path: "src/main.py"

forbidden_calls:
  - name: Write
    call_type: tool
    reason: "코드 리뷰 단계에서 파일을 수정하면 안 됨"

context_budget:
  max_input_tokens: 50000
  max_output_tokens: 4000
  max_turns: 5

tags:
  - code-review
  - routing
