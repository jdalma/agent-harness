# [Integration] 복수 도메인(주문+결제) → 오케스트레이터 E2E 검증
# Agent SDK로 실제 실행하여 domain-orchestrator → 개별 도메인 에이전트 위임 체인을 검증합니다.
# 실행: agent-harness scenarios/integration/multi_domain_order_payment_e2e.yaml --verbose
name: multi_domain_order_payment_e2e
description: |
  [Integration] Agent SDK로 실제 실행하여 주문+결제 복수 도메인 질문이
  domain-orchestrator → 개별 도메인 에이전트로 위임되는 전체 체인을 검증합니다.

  검증 포인트:
  1. domain-orchestrator가 호출되는가
  2. 단일 도메인 스킬(domain-ask)이 아닌 오케스트레이터가 사용되는가
  3. 전체 체인이 토큰 예산 내에서 완료되는가

runner: agent-sdk

agent_sdk_options:
  setting_sources: [project]
  permission_mode: bypassPermissions

model: claude-sonnet-4-20250514
max_tokens: 4096

messages:
  - role: user
    content: "주문에서 결제까지의 전체 플로우를 설명해줘. 결제 실패 시 주문은 어떻게 되는지도 포함해서."

expected_calls:
  - name: domain-orchestrator
    call_type: agent
    required: true

forbidden_calls:
  - name: domain-ask
    call_type: skill
    reason: "복수 도메인은 스킬이 아닌 오케스트레이터 경유 필수"

context_budget:
  max_total_tokens: 200000
  max_turns: 15

tags:
  - integration
  - domain-routing
  - multi-domain
  - order
  - payment
  - e2e
