# 시나리오: 단일 도메인(주문) 질문 → domain:ask 스킬 호출 검증
# 주문 관련 비즈니스 질문은 domain:ask 스킬을 통해 order 도메인 에이전트로 라우팅되어야 한다.
name: single_domain_order_routing
description: |
  단일 주문 도메인 질문이 들어왔을 때:
  1. domain-ask 스킬이 호출되는지 검증
  2. 오케스트레이터가 불필요하게 호출되지 않는지 검증
  3. 직접 도메인 컨텍스트 파일을 Read하지 않는지 검증

system_prompt: |
  당신은 Tamburins 이커머스 도메인 어시스턴트입니다.

  ## 도메인 라우팅 규칙
  비즈니스 도메인에 대한 질문, 분석, 코드 작업 시 아래 절차를 따릅니다:

  1. 사용자 요청과 도메인 에이전트 description을 대조하여 관련 도메인 식별
  2. 관련 도메인이 식별되면 반드시 스킬 또는 에이전트를 경유하여 컨텍스트에 접근 (직접 Read 금지)
  3. 복수 도메인이 관련되면 domain-orchestrator에게 위임

  ## 라우팅 모드
  - 관련 에이전트 1개 → 스킬 경유 (/domain:ask)
  - 관련 에이전트 2개+ → 오케스트레이터 위임 (domain-orchestrator)

  ## 도메인 에이전트 목록
  - order: 주문 생성, 취소, 반품, 장바구니, 배송 상태 추적
  - payment: 결제 처리, 환불, PG 연동 (PortOne/Stripe/PayPay)
  - inventory: 재고 검증, 예약/해제, 입출고, Redis 캐시
  - product: 상품 카탈로그, 가격/옵션, 번들/구성상품
  - promotion: 프로모션, 쿠폰, 할인 규칙, CartPriceRule, GWP

  ## 비 라우팅 대상
  - 빌드/배포/설정 관련 작업
  - 일반적인 프로그래밍 질문

model: claude-sonnet-4-20250514
max_tokens: 2048

tools:
  - name: Skill
    description: "도메인 스킬을 호출합니다. /domain:ask, /domain:impact 등"
    input_schema:
      type: object
      properties:
        skill:
          type: string
          description: "스킬 이름 (예: domain-ask, domain-impact, domain-scope)"
        args:
          type: string
          description: "스킬에 전달할 인자"
      required: [skill]

  - name: Task
    description: "서브에이전트를 실행합니다."
    input_schema:
      type: object
      properties:
        description:
          type: string
        prompt:
          type: string
        subagent_type:
          type: string
          enum: [order, payment, inventory, product, promotion, domain-orchestrator, Explore, general-purpose]
      required: [description, prompt, subagent_type]

  - name: Read
    description: "파일을 읽습니다"
    input_schema:
      type: object
      properties:
        file_path:
          type: string
      required: [file_path]

messages:
  - role: user
    content: "주문 취소 조건이 뭐야? 어떤 상태에서 취소가 가능한지 알려줘."

expected_calls:
  - name: domain-ask
    call_type: skill
    required: true

forbidden_calls:
  - name: domain-orchestrator
    call_type: agent
    reason: "단일 도메인 질문에 오케스트레이터 위임은 불필요"
  - name: Read
    call_type: tool
    reason: "도메인 컨텍스트 파일에 직접 Read 접근 금지 — 스킬/에이전트 경유 필수"

context_budget:
  max_total_tokens: 40000
  max_turns: 3

tags:
  - domain-routing
  - single-domain
  - order
  - skill-invocation
