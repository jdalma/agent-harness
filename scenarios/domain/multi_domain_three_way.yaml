# 시나리오: 3개 도메인(주문+결제+프로모션) 질문 → 오케스트레이터 위임 검증
# 체크아웃 → 할인 적용 → 결제 흐름은 3개 도메인에 걸치므로
# 반드시 domain-orchestrator가 호출되어야 한다.
name: multi_domain_three_way_routing
description: |
  주문, 프로모션, 결제 세 도메인에 걸친 복합 질문:
  1. domain-orchestrator 에이전트 호출 검증
  2. "A 후 B" 패턴 (순차적 도메인 관계) 감지 확인
  3. 직접 Read 금지 검증

system_prompt: |
  당신은 Tamburins 이커머스 도메인 어시스턴트입니다.

  ## 도메인 라우팅 규칙
  - 관련 에이전트 1개 → 스킬 경유 (/domain:ask)
  - 관련 에이전트 2개+ → 오케스트레이터 위임 (domain-orchestrator)

  ## 복수 도메인 판별 패턴
  - "A와 B": 명시적 복수 도메인
  - "A에서 B로": 도메인 간 흐름
  - "A 후 B": 순차적 도메인 관계

  ## 도메인 에이전트 목록
  - order: 주문 생성, 취소, 반품, 장바구니, 배송
  - payment: 결제 처리, 환불, PG 연동 (PortOne/Stripe/PayPay)
  - inventory: 재고 검증, 예약/해제, 입출고
  - product: 상품 카탈로그, 가격/옵션
  - promotion: 프로모션, 쿠폰, 할인, CartPriceRule, GWP

model: claude-sonnet-4-20250514
max_tokens: 4096

tools:
  - name: Skill
    description: "도메인 스킬을 호출합니다."
    input_schema:
      type: object
      properties:
        skill:
          type: string
        args:
          type: string
      required: [skill]

  - name: Task
    description: "서브에이전트를 실행합니다."
    input_schema:
      type: object
      properties:
        description:
          type: string
        prompt:
          type: string
        subagent_type:
          type: string
          enum: [order, payment, inventory, product, promotion, domain-orchestrator, Explore, general-purpose]
      required: [description, prompt, subagent_type]

  - name: Read
    description: "파일을 읽습니다"
    input_schema:
      type: object
      properties:
        file_path:
          type: string
      required: [file_path]

messages:
  - role: user
    content: |
      장바구니에서 쿠폰 할인 적용 후 결제까지의 전체 흐름을 설명해줘.
      CartPriceRule이 주문 금액에 어떻게 반영되고, 그 후 결제가 어떻게 진행되는지 알려줘.

expected_calls:
  - name: domain-orchestrator
    call_type: agent
    required: true

forbidden_calls:
  - name: Read
    call_type: tool
    reason: "도메인 컨텍스트 직접 Read 금지"

context_budget:
  max_total_tokens: 100000
  max_turns: 5

tags:
  - domain-routing
  - multi-domain
  - order
  - payment
  - promotion
  - orchestrator
