# 시나리오: 단일 도메인(OMS 프론트엔드) 질문 → domain:ask 스킬 호출 검증
# Tier 2 보조 도메인. OMS 프론트엔드 (React 18/TypeScript), 통합주문/재고/채널/프로모션/통계/Q&A UI.
name: single_domain_oms_front_routing
description: |
  OMS 프론트엔드 도메인 관련 단일 질문이 들어왔을 때:
  1. domain-ask 스킬이 호출되는지 검증
  2. 오케스트레이터가 불필요하게 호출되지 않는지 검증

system_prompt: |
  당신은 Tamburins 이커머스 도메인 어시스턴트입니다.

  ## 도메인 라우팅 규칙
  비즈니스 도메인 질문 시:
  - 관련 에이전트 1개 → 스킬 경유 (/domain:ask)
  - 관련 에이전트 2개+ → 오케스트레이터 위임 (domain-orchestrator)
  - 도메인 지식에 직접 접근하지 않는다

  ## Tier 1 핵심 도메인
  - order: 주문, 취소, 반품, 장바구니, 배송
  - payment: 결제, 환불, PG, PortOne, Stripe
  - inventory: 재고, 입출고, 예약, 캐시
  - product: 상품, 카탈로그, SKU, 번들, 옵션
  - promotion: 프로모션, 쿠폰, 할인, GWP, CartPriceRule
  - member: 관리자 회원, 권한, 그룹, 메뉴 접근 제어

  ## Tier 2 보조 도메인
  - content: FAQ, 공지, 배너, 키워드
  - customer-support: CS, 상담, 이벤트 예약, CTI, Freshworks CRM
  - integration: Salesforce, 레거시 동기화, 외부 물류
  - channel: 채널, 셀러, 매핑, 멀티채널 플랫폼
  - qna: Q&A, 질문, 답변, Shoplinker
  - oms-settings: OMS 관리자, 그룹, 메뉴, 국가 설정
  - oms-log: 감사 로그, 액션 추적, 변경 이력
  - admin-front: Admin 프론트엔드, 관리자 UI
  - oms-front: OMS 프론트엔드 (React 18/TypeScript), 통합주문/재고/채널/프로모션/통계/Q&A 관리 UI

model: claude-sonnet-4-20250514
max_tokens: 2048

tools:
  - name: Skill
    description: "도메인 스킬을 호출합니다."
    input_schema:
      type: object
      properties:
        skill:
          type: string
        args:
          type: string
      required: [skill]

  - name: Task
    description: "서브에이전트를 실행합니다."
    input_schema:
      type: object
      properties:
        description:
          type: string
        prompt:
          type: string
        subagent_type:
          type: string
      required: [description, prompt, subagent_type]

  - name: Read
    description: "파일을 읽습니다"
    input_schema:
      type: object
      properties:
        file_path:
          type: string
      required: [file_path]

messages:
  - role: user
    content: "OMS 프론트엔드의 통합주문 관리 화면은 어떤 구조로 되어있어?"

expected_calls:
  - name: domain-ask
    call_type: skill
    required: true

forbidden_calls:
  - name: domain-orchestrator
    call_type: agent
    reason: "oms-front 단일 도메인 질문 — 오케스트레이터 불필요"
  - name: Read
    call_type: tool
    reason: "도메인 컨텍스트 직접 Read 금지"

context_budget:
  max_total_tokens: 40000
  max_turns: 3

tags:
  - domain-routing
  - single-domain
  - tier2
  - oms-front
  - skill-invocation
