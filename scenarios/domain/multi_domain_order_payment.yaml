# 시나리오: 복수 도메인(주문+결제) 질문 → 오케스트레이터 위임 검증
# "주문 취소 시 환불 처리"는 order + payment 두 도메인이 관련되므로
# domain-orchestrator에게 위임되어야 한다.
name: multi_domain_order_payment_routing
description: |
  주문과 결제 두 도메인에 걸친 질문이 들어왔을 때:
  1. domain-orchestrator 에이전트가 호출되는지 검증
  2. 단일 도메인 스킬만 호출하지 않는지 검증
  CLAUDE.md 복수 도메인 판별 패턴: "A에서 B로" (도메인 간 흐름)

system_prompt: |
  당신은 Tamburins 이커머스 도메인 어시스턴트입니다.

  ## 도메인 라우팅 규칙
  - 관련 에이전트 1개 → 스킬 경유 (/domain:ask)
  - 관련 에이전트 2개+ → 오케스트레이터 위임 (domain-orchestrator)
  - 도메인 지식에 직접 접근하지 않는다

  ## 복수 도메인 판별 패턴
  - "A와 B": 명시적 복수 도메인
  - "A에서 B로": 도메인 간 흐름
  - "A 후 B": 순차적 도메인 관계
  - 하나의 도메인 dependencies에서 다른 도메인이 핵심 의존인 경우

  ## 도메인 에이전트 목록
  - order: 주문 생성, 취소, 반품, 장바구니, 배송 상태 추적
  - payment: 결제 처리, 환불, PG 연동 (PortOne/Stripe/PayPay)
  - inventory: 재고 검증, 예약/해제, 입출고
  - product: 상품 카탈로그, 가격/옵션
  - promotion: 프로모션, 쿠폰, 할인, GWP

model: claude-sonnet-4-20250514
max_tokens: 4096

tools:
  - name: Skill
    description: "도메인 스킬을 호출합니다."
    input_schema:
      type: object
      properties:
        skill:
          type: string
        args:
          type: string
      required: [skill]

  - name: Task
    description: "서브에이전트를 실행합니다."
    input_schema:
      type: object
      properties:
        description:
          type: string
        prompt:
          type: string
        subagent_type:
          type: string
          enum: [order, payment, inventory, product, promotion, domain-orchestrator, Explore, general-purpose]
      required: [description, prompt, subagent_type]

  - name: Read
    description: "파일을 읽습니다"
    input_schema:
      type: object
      properties:
        file_path:
          type: string
      required: [file_path]

messages:
  - role: user
    content: "주문 취소 시 결제 환불이 어떻게 처리돼? 주문에서 결제로 넘어가는 전체 흐름을 설명해줘."

expected_calls:
  - name: domain-orchestrator
    call_type: agent
    required: true

forbidden_calls:
  - name: Read
    call_type: tool
    reason: "도메인 컨텍스트 직접 Read 금지 — 에이전트 경유 필수"

context_budget:
  max_total_tokens: 80000
  max_turns: 5

tags:
  - domain-routing
  - multi-domain
  - order
  - payment
  - orchestrator
