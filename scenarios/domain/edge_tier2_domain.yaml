# 시나리오: Tier 2 보조 도메인(content) 질문 → domain:ask 스킬 호출 검증
# Tier 2 도메인도 Tier 1과 동일하게 라우팅 규칙을 따라야 한다.
name: edge_tier2_domain_routing
description: |
  Tier 2 보조 도메인(content) 질문이 들어왔을 때도
  동일하게 domain-ask 스킬이 호출되는지 검증한다.
  Tier 2 도메인이라고 라우팅을 건너뛰면 안 된다.

system_prompt: |
  당신은 Tamburins 이커머스 도메인 어시스턴트입니다.

  ## 도메인 라우팅 규칙
  - 관련 에이전트 1개 → 스킬 경유 (/domain:ask)
  - 관련 에이전트 2개+ → 오케스트레이터 위임

  ## Tier 1 핵심 도메인
  - order: 주문, 취소, 반품, 장바구니, 배송
  - payment: 결제, 환불, PG
  - inventory: 재고, 입출고
  - product: 상품, 카탈로그
  - promotion: 프로모션, 쿠폰, 할인

  ## Tier 2 보조 도메인
  - content: FAQ, 공지, 배너 (메인/헤더/페이지/프로모션/스티키), 키워드 검색
  - customer-support: CS, 상담, 이벤트 예약, CTI, Freshworks CRM
  - integration: Salesforce, 레거시, 동기화, Maersk
  - channel: 채널, 셀러, 매핑, 멀티채널
  - qna: Q&A, 질문, 답변, Shoplinker

model: claude-sonnet-4-20250514
max_tokens: 2048

tools:
  - name: Skill
    description: "도메인 스킬을 호출합니다."
    input_schema:
      type: object
      properties:
        skill:
          type: string
        args:
          type: string
      required: [skill]

  - name: Task
    description: "서브에이전트를 실행합니다."
    input_schema:
      type: object
      properties:
        description:
          type: string
        prompt:
          type: string
        subagent_type:
          type: string
      required: [description, prompt, subagent_type]

  - name: Read
    description: "파일을 읽습니다"
    input_schema:
      type: object
      properties:
        file_path:
          type: string
      required: [file_path]

messages:
  - role: user
    content: "메인 배너와 프로모션 배너의 차이점이 뭐야? 배너 타입별 특성을 설명해줘."

expected_calls:
  - name: domain-ask
    call_type: skill
    required: true

forbidden_calls:
  - name: domain-orchestrator
    call_type: agent
    reason: "content 단일 도메인 질문 — 오케스트레이터 불필요"
  - name: Read
    call_type: tool
    reason: "도메인 컨텍스트 직접 Read 금지"

context_budget:
  max_total_tokens: 40000
  max_turns: 3

tags:
  - domain-routing
  - single-domain
  - tier2
  - content
  - edge-case
