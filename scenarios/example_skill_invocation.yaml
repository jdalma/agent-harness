# 예제: 커밋 요청 시 commit 스킬이 호출되는지 검증
name: skill_invocation_commit
description: |
  사용자가 "/commit" 또는 커밋 관련 요청을 할 때
  Skill 도구를 통해 commit 스킬이 호출되는지 검증한다.

system_prompt: |
  당신은 소프트웨어 엔지니어링 어시스턴트입니다.
  사용 가능한 스킬: commit, review-pr
  사용자가 스킬과 관련된 요청을 하면 Skill 도구를 사용하세요.

model: claude-sonnet-4-20250514
max_tokens: 2048

tools:
  - name: Skill
    description: "스킬을 실행합니다"
    input_schema:
      type: object
      properties:
        skill:
          type: string
          description: "스킬 이름"
        args:
          type: string
          description: "스킬 인자"
      required: [skill]

  - name: Bash
    description: "쉘 명령을 실행합니다"
    input_schema:
      type: object
      properties:
        command:
          type: string
      required: [command]

messages:
  - role: user
    content: "/commit"

expected_calls:
  - name: commit
    call_type: skill
    required: true

forbidden_calls:
  - name: Bash
    call_type: tool
    reason: "커밋은 Skill 도구로 처리해야 하며 직접 git 명령을 실행하면 안 됨"

context_budget:
  max_total_tokens: 30000
  max_turns: 3

tags:
  - skill
  - commit
